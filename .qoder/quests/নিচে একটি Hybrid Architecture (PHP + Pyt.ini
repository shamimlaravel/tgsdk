Laravel Telegram Hybrid Storage (PHP + Python)

# Laravel Telegram Hybrid Storage

A hybrid Telegram storage system for Laravel that uses:

- PHP (Laravel package)
- Python (upload worker)
- Telegram as storage backend
- CDN accelerated streaming

This system allows:

- Upload any file format
- Permanent download links
- Telegram-based storage CDN
- Google Drive-like file hosting
- Facebook-style file sharing
- Ultra-fast streaming gateway
- Auto-scaling upload workers

---

# Tech Stack

Backend API
- PHP 8.4+
- Laravel 12+

Queue System
- Redis

Database
- MySQL / PostgreSQL

Worker
- Python 3.11+
- Pyrogram or Telethon

Streaming Gateway
- Nginx / Go

CDN
- Cloudflare / Bunny

